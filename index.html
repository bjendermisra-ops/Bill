<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Smart Bills Pro | प्रीमियम बिजनेस इनवॉइस</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* DARK THEME CORE */
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #e2e2e9; scroll-behavior: smooth; }
    .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

    /* NAVBAR */
    .navbar { background: rgba(15, 15, 22, 0.95); backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.5); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #2a2a35; }
    .nav-container { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; padding: 14px 24px; }
    .logo { font-size: 1.8rem; font-weight: 800; color: #ffffff; }
    .logo span, .logo i { color: #6c63ff; }
    .nav-links { display: flex; gap: 20px; list-style: none; flex-wrap: wrap; }
    .nav-links a { text-decoration: none; font-weight: 600; color: #a5a5b8; transition: 0.3s; cursor: pointer; font-size: 0.9rem; }
    .nav-links a:hover { color: #6c63ff; }

    .btn-primary { background: #6c63ff; border: none; padding: 10px 28px; border-radius: 40px; font-weight: 700; color: white; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3); }
    .btn-primary:hover { transform: translateY(-2px); background: #5750d9; }

    /* HERO */
    .hero { padding: 60px 0 40px; }
    .hero-grid { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 40px; }
    .hero-text h1 { font-size: 3rem; font-weight: 800; color: #ffffff; }
    .hero-badge { background: rgba(108, 99, 255, 0.15); color: #8c85ff; display: inline-block; padding: 6px 14px; border-radius: 30px; font-size: 0.85rem; font-weight: 600; border: 1px solid rgba(108, 99, 255, 0.3); }

    /* TOOLS GRID */
    .section-title { font-size: 2rem; font-weight: 700; margin-bottom: 2rem; text-align: center; color: #ffffff; }
    .section-title:after { content: ''; width: 70px; height: 4px; background: #6c63ff; display: block; margin: 12px auto 0; border-radius: 4px; }
    .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 24px; margin: 40px 0; }
    .tool-item { background: #151520; border-radius: 28px; padding: 24px 16px; text-align: center; cursor: pointer; border: 1px solid #2a2a35; transition: 0.3s; }
    .tool-item:hover { transform: translateY(-8px); border-color: #6c63ff; }
    .tool-icon { font-size: 2.8rem; color: #6c63ff; margin-bottom: 12px; }
    .tool-name { font-weight: 800; font-size: 1.2rem; margin: 8px 0; color: #fff; }

    /* BILL PANEL */
    .bill-panel { background: #181824; border-radius: 32px; padding: 35px; margin: 40px 0; border: 1px solid #2a2a35; }
    .form-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 24px; }
    .input-group { flex: 1; min-width: 180px; }
    .input-group label { font-weight: 600; display: block; margin-bottom: 8px; color: #a5a5b8; }
    input { width: 100%; padding: 12px 18px; border-radius: 12px; border: 1px solid #333344; background: #0a0a0f; color: #ffffff; font-family: inherit; }
    input:focus { border-color: #6c63ff; outline: none; }

    /* TABLE */
    .bill-table-wrapper { overflow-x: auto; margin: 25px 0; border-radius: 16px; border: 1px solid #2a2a35; }
    .bill-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
    .bill-table th { background: #20202e; color: #ffffff; padding: 14px 12px; font-weight: 600; text-align: center; }
    .bill-table td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #2a2a35; }
    .bill-table input { width: 100%; min-width: 80px; padding: 8px 10px; border-radius: 8px; border: 1px solid #333344; background: #151520; color: white; text-align: center; }
    .remove-row-btn { background: rgba(255, 75, 75, 0.1); border: 1px solid #ff4b4b; color: #ff4b4b; padding: 6px 14px; border-radius: 8px; cursor: pointer; }
    .add-row-btn { background: rgba(108, 99, 255, 0.1); border: 2px dashed #6c63ff; color: #8c85ff; padding: 12px 24px; border-radius: 12px; cursor: pointer; font-weight: 600; margin-top: 15px; width: 100%; }

    /* LIVE BILL PREVIEW */
    .live-bill-preview { background: #0f0f16; border-radius: 20px; padding: 25px; margin-top: 30px; border: 1px solid #2a2a35; }
    .preview-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; border-bottom: 1px dashed #444; padding-bottom: 15px; margin-bottom: 20px; }
    .download-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
    .download-btn { color: white; padding: 10px 16px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-size: 0.88rem; display: flex; align-items: center; gap: 6px; }
    .download-btn.pdf { background: #ff4757; } .download-btn.png { background: #2ed573; } .download-btn.jpg { background: #ffa502; } .download-btn.print { background: #3742fa; }
    .download-btn.whatsapp { background: #25D366; color: white; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
    
    /* 🔥 PREMIUM BILL PAPER DESIGN */
    .bill-content { font-family: 'Inter', sans-serif; background: #ffffff; color: #1a1a2e; padding: 40px; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); max-width: 800px; margin: 0 auto; }
    .invoice-header-box { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #f0f0f5; padding-bottom: 20px; margin-bottom: 30px; }
    .invoice-header-left h1 { color: #6c63ff; font-size: 2.4rem; font-weight: 800; margin-bottom: 5px; }
    .invoice-header-right { text-align: right; }
    .invoice-header-right h2 { font-size: 2rem; color: #e0e0e0; text-transform: uppercase; margin-bottom: 10px; }
    .premium-table { width: 100%; border-collapse: separate; border-spacing: 0; margin-bottom: 30px; }
    .premium-table th { background: #6c63ff; color: #ffffff; padding: 15px; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; }
    .premium-table th:first-child { border-top-left-radius: 10px; border-bottom-left-radius: 10px; text-align: left; }
    .premium-table th:last-child { border-top-right-radius: 10px; border-bottom-right-radius: 10px; }
    .premium-table td { padding: 15px; border-bottom: 1px solid #f0f0f5; color: #333; }
    
    .totals-wrapper { display: flex; justify-content: space-between; }
    .notes-box { width: 50%; background: #f9f9fb; padding: 15px; border-radius: 10px; border-left: 4px solid #6c63ff; font-size: 0.85rem; color: #555; }
    .totals-box { width: 350px; background: #fdfdfd; border: 1px solid #eaeaea; border-radius: 12px; padding: 20px; }
    .totals-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 1rem; color: #555; }
    .grand-total-row { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 2px dashed #e0e0e0; font-size: 1.5rem; font-weight: 800; color: #6c63ff; }

    .print-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(150px); background: #252535; color: white; padding: 14px 28px; border-radius: 12px; z-index: 9999; transition: transform 0.4s; }
    .print-toast.show { transform: translateX(-50%) translateY(0); }
    .active-badge { background: rgba(108, 99, 255, 0.15); border: 1px solid rgba(108, 99, 255, 0.4); padding: 8px 20px; border-radius: 40px; color: #8c85ff; }
  </style>
</head>
<body>

<div class="print-toast" id="printToast">⏳ प्रोसेस हो रहा है...</div>

<nav class="navbar">
  <div class="nav-container">
    <div class="logo"><i class="fas fa-file-invoice"></i> SmartBills<span>.Pro</span></div>
    <ul class="nav-links">
      <li><a onclick="document.getElementById('home').scrollIntoView()">Home</a></li>
      <li><a onclick="document.getElementById('tools').scrollIntoView()">Templates</a></li>
    </ul>
    <button class="btn-primary" onclick="document.getElementById('generatorSection').scrollIntoView()"><i class="fas fa-plus"></i> बिल बनाएं</button>
  </div>
</nav>

<main>
  <section id="home" class="hero">
    <div class="container hero-grid">
      <div class="hero-text">
        <span class="hero-badge"><i class="fas fa-check-circle"></i> Sketchware Java Fixed</span>
        <br><br>
        <h1>प्रोफेशनल व्यापार <br><span style="color:#6c63ff;">इनवॉइस जनरेटर</span></h1>
      </div>
    </div>
  </section>

  <div class="container" id="tools">
    <h2 class="section-title">📦 रेडीमेड टेम्प्लेट</h2>
    <div class="tools-grid" id="toolsGrid"></div>
  </div>

  <div class="container" id="generatorSection">
    <div class="bill-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:20px;">
        <h2 style="color:#fff;"><i class="fas fa-edit"></i> इनवॉइस डिटेल्स</h2>
        <span class="active-badge" id="activeToolBadge"><i class="fas fa-briefcase"></i> प्रीमियम व्यापार बिल</span>
      </div>

      <div class="form-row">
        <div class="input-group"><label>🏢 कंपनी का नाम</label><input type="text" id="businessName" value="टेक सॉल्यूशंस प्राइवेट लिमिटेड"></div>
        <div class="input-group"><label>👤 ग्राहक का नाम</label><input type="text" id="customerName" value="रवि कुमार"></div>
        <div class="input-group"><label>📅 इनवॉइस डेट</label><input type="date" id="billDate"></div>
        <div class="input-group"><label>🧾 इनवॉइस नंबर</label><input type="text" id="billNumber" value="INV-2026-01"></div>
      </div>

      <div class="bill-table-wrapper">
        <table class="bill-table" id="itemsTable">
          <thead>
            <tr><th style="text-align:left;">विवरण</th><th>मात्रा (Qty)</th><th>दर (₹)</th><th>कुल (₹)</th><th style="width:70px;">Action</th></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <button class="add-row-btn" id="addTableRowBtn"><i class="fas fa-plus"></i> नया आइटम जोड़ें</button>

      <div class="form-row" style="margin-top:25px;">
        <div class="input-group"><label>📝 Note</label><input type="text" id="extraNote" value="धन्यवाद! कृपया 7 दिनों के भीतर भुगतान करें।"></div>
        <div class="input-group"><label>💸 GST (%)</label><input type="number" id="gstPercent" value="18" step="0.5"></div>
      </div>

      <div class="live-bill-preview" id="livePreviewContainer">
        <div class="preview-header">
          <h3 style="color:#fff;"><i class="fas fa-eye"></i> लाइव प्रीव्यू</h3>
          <div class="download-buttons">
            <button class="download-btn pdf" id="downloadPDFBtn"><i class="fas fa-file-pdf"></i> PDF</button>
            <button class="download-btn png" id="downloadPNGBtn"><i class="fas fa-image"></i> PNG</button>
            <button class="download-btn jpg" id="downloadJPGBtn"><i class="fas fa-camera"></i> JPG</button>
            <button class="download-btn print" id="printBillBtn" onclick="printBill()"><i class="fas fa-print"></i> Print</button>
            <button class="download-btn whatsapp" id="shareWhatsAppBtn"><i class="fab fa-whatsapp" style="font-size:1.1rem;"></i> Share WA</button>
          </div>
        </div>
        
        <div id="billPreviewContent" class="bill-content">
          <div style="text-align:center;padding:20px;color:#000;">बिल लोड हो रहा है...</div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  const tableBody = document.getElementById("tableBody");
  const businessInput = document.getElementById("businessName");
  const customerInput = document.getElementById("customerName");
  const billDateInput = document.getElementById("billDate");
  const billNumberInput = document.getElementById("billNumber");
  const extraNoteInput = document.getElementById("extraNote");
  const gstPercentInput = document.getElementById("gstPercent");
  const previewDiv = document.getElementById("billPreviewContent");

  billDateInput.value = new Date().toISOString().slice(0,10);
  let defaultItems =[{ name: "वेबसाइट डेवलपमेंट", qty: 1, price: 15000 },{ name: "SEO सर्विसेस (मासिक)", qty: 1, price: 5000 }];

  function renderTableRows() {
    tableBody.innerHTML = "";
    defaultItems.forEach((item, idx) => {
      const row = document.createElement("tr");
      row.innerHTML = `<td style="text-align:left;"><input type="text" class="item-name-input" value="${escapeHtml(item.name)}" data-idx="${idx}" style="text-align:left;"></td>
        <td><input type="number" class="item-qty-input" value="${item.qty}" step="0.5" data-idx="${idx}"></td>
        <td><input type="number" class="item-price-input" value="${item.price}" data-idx="${idx}"></td>
        <td style="font-weight:600;">₹${(item.qty * item.price).toFixed(2)}</td>
        <td><button class="remove-row-btn" data-idx="${idx}"><i class="fas fa-trash"></i></button></td>`;
      tableBody.appendChild(row);
    });
    attachTableEvents(); updateLiveBill();
  }

  function attachTableEvents() {
    document.querySelectorAll(".item-name-input, .item-qty-input, .item-price-input").forEach(inp => { inp.addEventListener("input", handleItemChange); });
    document.querySelectorAll(".remove-row-btn").forEach(btn => { btn.addEventListener("click", handleRemoveRow); });
  }

  function handleItemChange(e) {
    const idx = e.target.getAttribute("data-idx");
    if (idx !== null) {
      defaultItems[idx].name = document.querySelector(`.item-name-input[data-idx='${idx}']`).value;
      defaultItems[idx].qty = parseFloat(document.querySelector(`.item-qty-input[data-idx='${idx}']`).value) || 0;
      defaultItems[idx].price = parseFloat(document.querySelector(`.item-price-input[data-idx='${idx}']`).value) || 0;
    }
    renderTableRows();
  }

  function handleRemoveRow(e) { const idx = e.currentTarget.getAttribute("data-idx"); if (idx !== null) { defaultItems.splice(parseInt(idx), 1); renderTableRows(); } }

  function getCurrentBillData() {
    let items = defaultItems.map(item => ({ name: item.name, quantity: item.qty, price: item.price, total: item.qty * item.price }));
    let subtotal = items.reduce((sum, i) => sum + i.total, 0);
    let gstPercent = parseFloat(gstPercentInput.value) || 0; let gstAmount = subtotal * (gstPercent / 100);
    return { items, subtotal, gstPercent, gstAmount, grandTotal: subtotal + gstAmount };
  }

  function escapeHtml(str) { return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  function updateLiveBill() {
    const { items, subtotal, gstPercent, gstAmount, grandTotal } = getCurrentBillData();
    let itemsHtml = `<table class="premium-table"><thead><tr><th>विवरण</th><th style="text-align:center;">मात्रा</th><th style="text-align:center;">दर (₹)</th><th style="text-align:center;">कुल (₹)</th></tr></thead><tbody>`;
    items.forEach(it => { itemsHtml += `<tr><td><strong>${it.name}</strong></td><td style="text-align:center;">${it.quantity}</td><td style="text-align:center;">₹${it.price.toFixed(2)}</td><td style="text-align:center; font-weight:700; color:#6c63ff;">₹${it.total.toFixed(2)}</td></tr>`; });
    itemsHtml += `</tbody></table>`;

    previewDiv.innerHTML = `
      <div class="invoice-header-box">
        <div class="invoice-header-left"><h1>${businessInput.value || "कंपनी"}</h1><p style="color:#777; font-size:0.9rem;">प्रोफेशनल बिज़नेस इनवॉइस</p></div>
        <div class="invoice-header-right"><h2>INVOICE</h2><p>इनवॉइस नं: <strong>${billNumberInput.value}</strong></p><p>दिनांक: <strong>${billDateInput.value}</strong></p></div>
      </div>
      <div style="margin-bottom:30px;"><p style="color:#777; font-size:0.9rem;">Bill To / ग्राहक:</p><h3 style="font-size:1.4rem; color:#1a1a2e; font-weight:700;">${customerInput.value}</h3></div>
      ${itemsHtml}
      <div class="totals-wrapper">
        <div class="notes-box"><strong>Note:</strong><br>${extraNoteInput.value}</div>
        <div class="totals-box">
          <div class="totals-row"><span>उप-कुल:</span><strong>₹${subtotal.toFixed(2)}</strong></div>
          ${gstPercent > 0 ? `<div class="totals-row"><span>टैक्स (${gstPercent}%):</span><strong>₹${gstAmount.toFixed(2)}</strong></div>` : ''}
          <div class="grand-total-row"><span>कुल भुगतान:</span><span>₹${grandTotal.toFixed(2)}</span></div>
        </div>
      </div>`;
  }

  document.getElementById("addTableRowBtn").addEventListener("click", () => { defaultItems.push({ name: "", qty: 1, price: 0 }); renderTableRows(); });[businessInput, customerInput, billDateInput, billNumberInput, extraNoteInput, gstPercentInput].forEach(field => { field.addEventListener("input", updateLiveBill); });

  const billTools =[{ name: "Web Agency", icon: "fas fa-laptop-code", items:[{name:"Website",qty:1,price:25000}], businessName: "WebTech Pvt Ltd"},{ name: "Electronics", icon: "fas fa-mobile", items:[{name:"Mobile",qty:1,price:15000}], businessName: "Tech Store"}];
  const toolsGridDiv = document.getElementById("toolsGrid");
  billTools.forEach(tool => {
    const div = document.createElement("div"); div.className = "tool-item";
    div.innerHTML = `<div class="tool-icon"><i class="${tool.icon}"></i></div><div class="tool-name">${tool.name}</div><small>ऑटो-फिल टेम्प्लेट</small>`;
    div.addEventListener("click", () => { businessInput.value = tool.businessName; defaultItems = JSON.parse(JSON.stringify(tool.items)); renderTableRows(); document.getElementById("generatorSection").scrollIntoView(); });
    toolsGridDiv.appendChild(div);
  });

  function showToast(msg) { const toast = document.getElementById("printToast"); toast.textContent = msg; toast.classList.add("show"); setTimeout(() => { toast.classList.remove("show"); }, 3500); }

  async function captureBillElement() {
    const element = document.getElementById("billPreviewContent");
    const originalBg = element.style.backgroundColor; element.style.backgroundColor = "white"; 
    const canvas = await html2canvas(element, { scale: 2.5, backgroundColor: "#ffffff" });
    element.style.backgroundColor = originalBg; return canvas;
  }

  document.getElementById("downloadPNGBtn").addEventListener("click", async () => { const canvas = await captureBillElement(); const link = document.createElement("a"); link.download = "Invoice.png"; link.href = canvas.toDataURL("image/png"); link.click(); showToast("✅ PNG डाउनलोड!"); });
  document.getElementById("downloadJPGBtn").addEventListener("click", async () => { const canvas = await captureBillElement(); const link = document.createElement("a"); link.download = "Invoice.jpg"; link.href = canvas.toDataURL("image/jpeg", 0.95); link.click(); showToast("✅ JPG डाउनलोड!"); });
  document.getElementById("downloadPDFBtn").addEventListener("click", async () => { const canvas = await captureBillElement(); const { jsPDF } = window.jspdf; const pdf = new jsPDF("p", "mm", "a4"); pdf.addImage(canvas.toDataURL("image/png"), "PNG", 10, 10, 190, (canvas.height * 190) / canvas.width); pdf.save("Invoice.pdf"); showToast("✅ PDF डाउनलोड!"); });

  function printBill() { const w = window.open('', '_blank'); w.document.write(`<html><head><style>body{font-family:sans-serif;padding:20px;} .invoice-header-box{display:flex;justify-content:space-between;border-bottom:2px solid #ddd;padding-bottom:20px;} .premium-table{width:100%;border-collapse:collapse;margin:20px 0;} .premium-table th{background:#000;color:#fff;padding:10px;} .premium-table td{padding:10px;border-bottom:1px solid #ddd;} .totals-wrapper{display:flex;justify-content:space-between;} .totals-box{width:300px;} .grand-total-row{display:flex;justify-content:space-between;font-size:1.5rem;font-weight:bold;margin-top:10px;border-top:2px dashed #000;}</style></head><body>${document.getElementById("billPreviewContent").innerHTML}</body></html>`); setTimeout(() => { w.print(); }, 800); }

  // 🔥 100% FIXED WHATSAPP CODE (Matches your Java Intent)
  document.getElementById("shareWhatsAppBtn").addEventListener("click", async () => {
    showToast("⏳ WhatsApp खुल रहा है...");
    const canvas = await captureBillElement();
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");
    pdf.addImage(canvas.toDataURL("image/png"), "PNG", 10, 10, 190, (canvas.height * 190) / canvas.width);
    pdf.save("Invoice.pdf");

    const shareMessage = `नमस्ते ${customerInput.value},\n\nआपका बिल/इनवॉइस (₹${getCurrentBillData().grandTotal.toFixed(2)}) तैयार है। (PDF डाउनलोड हो गई है, कृपया उसे यहाँ Attach करें)।\n\nधन्यवाद!\n${businessInput.value}`;

    // यह सीधा whatsapp:// भेजेगा, और आपका Java Code उसे पकड़कर WhatsApp खोल देगा!
    setTimeout(() => {
      window.location.href = `whatsapp://send?text=${encodeURIComponent(shareMessage)}`;
    }, 1000);
  });

  renderTableRows();
</script>
</body>
</html>
